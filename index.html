<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick & Pack · Suivi Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --navy: #0f172a;
  --navy-light: #1e293b;
  --navy-mid: #334155;
  --teal: #0d9488;
  --teal-glow: #14b8a6;
  --amber: #f59e0b;
  --red: #ef4444;
  --green: #22c55e;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --card-bg: rgba(30, 41, 59, 0.7);
  --border: rgba(148, 163, 184, 0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(13,148,136,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(245,158,11,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 480px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--teal);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── OPERATOR BADGE ── */
.op-badge {
  background: linear-gradient(135deg, var(--teal), #0891b2);
  border-radius: 16px;
  padding: 20px;
  margin: 16px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.op-badge::after {
  content: '';
  position: absolute;
  top: -50%; right: -30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.op-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.op-mat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  opacity: 0.7;
  margin-top: 2px;
}
.op-score-big {
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  margin: 12px 0 4px;
}
.op-rank {
  font-size: 13px;
  opacity: 0.85;
}

/* ── SCORE COLORS ── */
.score-green { color: var(--green); }
.score-amber { color: var(--amber); }
.score-red { color: var(--red); }

/* ── CARDS ── */
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  backdrop-filter: blur(12px);
}
.card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--teal);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.kpi {
  background: rgba(15, 23, 42, 0.5);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.kpi-value {
  font-size: 24px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.kpi-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── BAR COMPARE ── */
.bar-compare { margin: 8px 0; }
.bar-row {
  display: flex;
  align-items: center;
  margin: 8px 0;
  gap: 10px;
}
.bar-label {
  font-size: 11px;
  color: var(--text-muted);
  width: 60px;
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 22px;
  background: rgba(15, 23, 42, 0.6);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: center;
  padding: 0 8px;
}
.bar-fill-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.bar-perso { background: linear-gradient(90deg, var(--teal), var(--teal-glow)); }
.bar-equipe { background: rgba(148, 163, 184, 0.3); }

/* ── MONTHLY CHART ── */
.month-bars {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 120px;
  padding: 0 20px;
  margin-top: 8px;
}
.month-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}
.month-bar {
  width: 100%;
  border-radius: 6px 6px 2px 2px;
  min-height: 4px;
  position: relative;
  transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.month-bar-val {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.month-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
  font-weight: 500;
}

/* ── TEAM SECTION ── */
.team-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.team-stat:last-child { border-bottom: none; }
.team-stat-label { font-size: 13px; color: var(--text-muted); }
.team-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 11px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

/* ── ADMIN PAGE ── */
.admin-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.admin-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}
.admin-card:hover {
  transform: translateY(-2px);
  border-color: var(--teal);
}
.admin-card-name {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 2px;
}
.admin-card-mat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.admin-card canvas,
.admin-card img {
  border-radius: 6px;
}
.admin-card-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
}
.admin-card-rank {
  font-size: 11px;
  color: var(--text-muted);
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: rgba(15,23,42,0.5);
  border-radius: 10px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 8px 4px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.2s;
  border: none;
  background: none;
  font-family: inherit;
}
.tab.active {
  background: var(--teal);
  color: white;
}

/* ── BACK BUTTON ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--teal);
  cursor: pointer;
  margin-bottom: 12px;
  border: none;
  background: none;
  font-family: inherit;
  padding: 6px 0;
}
.back-btn:hover { color: var(--teal-glow); }

/* ── PRINT STYLES ── */
@media print {
  body { background: white; color: black; }
  body::before { display: none; }
  .admin-card { break-inside: avoid; border: 2px solid #ccc; }
  .admin-card-name { color: black; }
  .back-btn, .no-print { display: none !important; }
}

/* ── ERROR / LOADING ── */
.error-page {
  text-align: center;
  padding: 60px 20px;
}
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.error-msg { font-size: 13px; color: var(--text-muted); }
</style>
</head>

const app = document.getElementById('app');

// URL base — change this to your GitHub Pages URL
const BASE_URL = getBaseURL();

function getBaseURL() {
  return window.location.origin + window.location.pathname;
}

function getScoreClass(score) {
  if (score >= 80) return 'score-green';
  if (score >= 60) return 'score-amber';
  return 'score-red';
}

function getScoreEmoji(score) {
  if (score >= 90) return '🟢';
  if (score >= 80) return '🟡';
  if (score >= 60) return '🟠';
  return '🔴';
}

// ── ROUTING ──
function route() {
  const params = new URLSearchParams(window.location.search);
  const opId = params.get('op');
  
  if (opId) {
    const op = DATA.operators.find(o => o.id === opId.toUpperCase());
    if (op) {
      renderOperator(op);
    } else {
      renderError();
    }
  } else {
    renderAdmin();
  }
}

        colorDark: '#0f172a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  });
}

function showOp(id) {
  window.location.search = `?op=${id}`;
}

    <!-- TAB: MA PROD -->
    <div id="tab-perso">
      <div class="card">
        <div class="card-title">Mes indicateurs</div>
        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-value" style="color:var(--teal)">${op.prod.toLocaleString('fr')}</div>
            <div class="kpi-label">Lignes produites</div>
          </div>
          <div class="kpi">
            <div class="kpi-value">${op.prod_j.toFixed(0)}</div>
            <div class="kpi-label">Prod / jour</div>
          </div>
          <div class="kpi">
            <div class="kpi-value ${op.quota >= 90 ? 'score-green' : op.quota >= 70 ? 'score-amber' : 'score-red'}">${op.quota.toFixed(1)}%</div>
            <div class="kpi-label">Quota moyen</div>
          </div>
          <div class="kpi">
            <div class="kpi-value">${op.heures.toFixed(0)}h</div>
            <div class="kpi-label">Heures travaillées</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Qualité</div>
        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-value" style="color:var(--amber)">${op.err_dec}</div>
            <div class="kpi-label">Err. décelées</div>
          </div>
          <div class="kpi">
            <div class="kpi-value" style="color:${op.err_ave > 5 ? 'var(--red)' : 'var(--green)'}">${op.err_ave}</div>
            <div class="kpi-label">Err. avérées</div>
          </div>
          <div class="kpi">
            <div class="kpi-value ${op.ppm > 300 ? 'score-red' : op.ppm > 150 ? 'score-amber' : 'score-green'}">${op.ppm.toFixed(0)}</div>
            <div class="kpi-label">PPM</div>
          </div>
          <div class="kpi">
            <div class="kpi-value">${op.jours}</div>
            <div class="kpi-label">Jours travaillés</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Évolution mensuelle (lignes)</div>
        <div class="month-bars">
          ${['Janv', 'Févr', 'Mars'].map((m, i) => {
            const val = months[i];
            const h = val > 0 ? Math.max((val / maxMonth) * 100, 5) : 3;
            const color = i === 2 ? 'var(--teal)' : 'rgba(148,163,184,0.4)';
            return `
              <div class="month-col">
                <div class="month-bar" style="height:${h}%;background:${color}">
                  <div class="month-bar-val">${val > 0 ? val.toLocaleString('fr') : '—'}</div>
                </div>
                <div class="month-label">${m}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- TAB: VS ÉQUIPE -->
    <div id="tab-compare" style="display:none">
      <div class="card">
        <div class="card-title">Production / jour</div>
        <div class="bar-compare">
          <div class="bar-row">
            <div class="bar-label">Moi</div>
            <div class="bar-track">
              <div class="bar-fill bar-perso" style="width:${(op.prod_j/maxProdJ*100).toFixed(1)}%">
                <span class="bar-fill-val">${op.prod_j.toFixed(0)} lig/j</span>
              </div>
            </div>
          </div>
          <div class="bar-row">
            <div class="bar-label">Équipe</div>
            <div class="bar-track">
              <div class="bar-fill bar-equipe" style="width:${(team.avg_prod_j/maxProdJ*100).toFixed(1)}%">
                <span class="bar-fill-val">${team.avg_prod_j.toFixed(0)} lig/j</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Quota moyen %</div>
        <div class="bar-compare">
          <div class="bar-row">
            <div class="bar-label">Moi</div>
            <div class="bar-track">
              <div class="bar-fill bar-perso" style="width:${Math.min((op.quota/maxQuota*100), 100).toFixed(1)}%">
                <span class="bar-fill-val">${op.quota.toFixed(1)}%</span>
              </div>
            </div>
          </div>
          <div class="bar-row">
            <div class="bar-label">Équipe</div>
            <div class="bar-track">
              <div class="bar-fill bar-equipe" style="width:${Math.min((team.avg_quota/maxQuota*100), 100).toFixed(1)}%">
                <span class="bar-fill-val">${team.avg_quota.toFixed(1)}%</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">PPM (erreurs par million)</div>
        <div class="bar-compare">
          ${(() => {
            const maxPPM = Math.max(op.ppm, team.avg_ppm) * 1.15 || 1;
            return `
              <div class="bar-row">
                <div class="bar-label">Moi</div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${(op.ppm/maxPPM*100).toFixed(1)}%;background:${op.ppm > team.avg_ppm ? 'var(--red)' : 'var(--green)'}">
                    <span class="bar-fill-val">${op.ppm.toFixed(0)}</span>
                  </div>
                </div>
              </div>
              <div class="bar-row">
                <div class="bar-label">Équipe</div>
                <div class="bar-track">
                  <div class="bar-fill bar-equipe" style="width:${(team.avg_ppm/maxPPM*100).toFixed(1)}%">
                    <span class="bar-fill-val">${team.avg_ppm.toFixed(0)}</span>
                  </div>
                </div>
              </div>
            `;
          })()}
        </div>
        <p style="font-size:11px;color:var(--text-muted);margin-top:8px;text-align:center">⬇ Plus bas = meilleur</p>
      </div>
    </div>

    <!-- TAB: ÉQUIPE -->
    <div id="tab-equipe" style="display:none">
      <div class="card">
        <div class="card-title">Indicateurs équipe (${team.nb_operateurs} opérateurs)</div>
        <div class="team-stat">
          <span class="team-stat-label">Prod moyenne / jour</span>
          <span class="team-stat-val">${team.avg_prod_j.toFixed(0)} lig/j</span>
        </div>
        <div class="team-stat">
          <span class="team-stat-label">Quota moyen</span>
          <span class="team-stat-val">${team.avg_quota.toFixed(1)}%</span>
        </div>
        <div class="team-stat">
          <span class="team-stat-label">Score moyen</span>
          <span class="team-stat-val">${team.avg_score.toFixed(1)}/100</span>
        </div>
        <div class="team-stat">
          <span class="team-stat-label">PPM moyen</span>
          <span class="team-stat-val">${team.avg_ppm.toFixed(0)}</span>
        </div>
        <div class="team-stat">
          <span class="team-stat-label">Erreurs décelées (total)</span>
          <span class="team-stat-val" style="color:var(--amber)">${team.total_err_dec}</span>
        </div>
        <div class="team-stat">
          <span class="team-stat-label">Erreurs avérées (total)</span>
          <span class="team-stat-val" style="color:var(--red)">${team.total_err_ave}</span>
        </div>
      </div>
    </div>

    <div class="footer">
      Données confidentielles · Accès personnel via QR code<br>
      Aucune donnée individuelle tierce accessible
    </div>
  `;
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['tab-perso', 'tab-compare', 'tab-equipe'].forEach(id => {
    document.getElementById(id).style.display = id === tabId ? 'block' : 'none';
  });
}

function renderError() {
  app.innerHTML = `
    <div class="error-page">
      <div class="error-icon">🔒</div>
      <div class="error-title">Opérateur non trouvé</div>
      <div class="error-msg">Le QR code ne correspond à aucun opérateur actif.<br>Contactez votre superviseur.</div>
    </div>
  `;
}

// ── INIT ──
route();
</script>
</body>
</html>
